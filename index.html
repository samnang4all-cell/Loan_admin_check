};
const TabsList = ({ className = "", children, __value, __setValue }) => (
  <div className={cx("inline-flex items-center justify-center rounded-md bg-slate-100 p-1", className)}>
    {React.Children.map(children, (c) => React.cloneElement(c, { __value, __setValue }))}

);
const TabsTrigger = ({ value, children, __value, __setValue }) => {
  const active = __value === value;
  return (
    <button onClick={() => __setValue(value)}
      className={cx("inline-flex w-full items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-medium transition",

    </button>
  );
};
const TabsContent = ({ value, className = "", children, __value }) =>
  __value !== value ? null : <div className={className}>{children}</div>;

/* ---------- Date helpers ---------- */
function formatDate(dateString) {
  if (!dateString) return "—";
  const d = new Date(dateString + "T00:00:00");
  return new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", year: "numeric" }).format(d);
}
function addDays(date, days) { const d = new Date(date); d.setDate(d.getDate() + days); return d; }
function addMonths(date, months) {
  const d = new Date(date); const day = d.getDate();
  d.setMonth(d.getMonth() + months);
  if (d.getDate() < day) d.setDate(0);
  return d;
}
function toDateInputValue(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}
function getSchedule(plan) {
  const start = new Date(plan.startDate + "T00:00:00");
  const end = plan.endDate ? new Date(plan.endDate + "T00:00:00") : null;
  const dates = [];
  if (plan.cadence === "daily") {
    let cursor = new Date(start); let g = 0;
    while ((!end || cursor <= end) && g < 120) { dates.push(new Date(cursor)); cursor = addDays(cursor, 1); g++; }
  } else if (plan.cadence === "tenDays") {
    let cursor = new Date(start); let g = 0;
    while ((!end || cursor <= end) && g < 24) { dates.push(new Date(cursor)); cursor = addDays(cursor, 10); g++; }
  } else if (plan.cadence === "monthly") {
    let cursor = new Date(start); let g = 0;
    while ((!end || cursor <= end) && g < 24) { dates.push(new Date(cursor)); cursor = addMonths(cursor, 1); g++; }
  } else {
    dates.push(new Date(start));
    if (end && end.getTime() !== start.getTime()) dates.push(new Date(end));
  }
  return dates;
}

/* ---------- Auth + remote storage ---------- */
async function sha256Hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

async function loadFromJsonBin() {
  if (!CONFIG.JSONBIN_BIN_ID || CONFIG.JSONBIN_BIN_ID.startsWith("PUT_")) return null;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}/latest`, {
      headers: { "X-Master-Key": CONFIG.JSONBIN_MASTER_KEY },
    });
    if (!res.ok) throw new Error("Fetch failed: " + res.status);
    const json = await res.json();
    const record = json.record;
    if (Array.isArray(record) && record.length) return record;
    if (record && Array.isArray(record.plans)) return record.plans;
    return null;
  } catch (e) {
    console.warn("JSONBin load failed:", e);
    return null;
  }
}

async function saveToJsonBin(plans) {
  if (!CONFIG.JSONBIN_BIN_ID || CONFIG.JSONBIN_BIN_ID.startsWith("PUT_"))
    throw new Error("JSONBin not configured");
  const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": CONFIG.JSONBIN_MASTER_KEY,
    },
    body: JSON.stringify({ plans }),
  });
  if (!res.ok) throw new Error("Save failed: " + res.status);
  return res.json();
}

/* ---------- Login modal ---------- */
function LoginModal({ onLogin, onCancel }) {
  const [pwd, setPwd] = useState("");
  const [show, setShow] = useState(false);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const tryLogin = async () => {
    if (!pwd) return;
    setBusy(true); setError("");
    const h = await sha256Hex(pwd);
    if (h === CONFIG.PASSWORD_HASH) {
      sessionStorage.setItem("ppl_admin", "1");
      onLogin();
    } else {
      setError("Incorrect password.");
      setBusy(false);
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
      <Card className="w-full max-w-sm shadow-xl">
        <CardHeader>
          <CardTitle className="flex items-center gap-2 text-lg">
            <Lock className="h-5 w-5" /> Admin login
          </CardTitle>
          <p className="mt-2 text-sm text-slate-500">Enter password to edit plans.</p>
        </CardHeader>
        <CardContent className="space-y-4">
          <div className="space-y-2">
            <Label>Password</Label>
            <div className="relative">
              <Input type={show ? "text" : "password"} value={pwd}
                onChange={(e) => setPwd(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && tryLogin()}
                autoFocus />
              <button type="button" onClick={() => setShow(!show)}
                className="absolute right-2 top-1/2 -translate-y-1/2 rounded p-1 text-slate-500 hover:bg-slate-100">
                <Eye className="h-4 w-4" />
              </button>
            </div>
            {error && <div className="text-sm text-red-600">{error}</div>}
          </div>
          <div className="flex justify-end gap-2">
            <Button variant="outline" onClick={onCancel}>Cancel</Button>
            <Button onClick={tryLogin} disabled={busy || !pwd}>
              {busy ? "Checking…" : "Login"}
            </Button>
          </div>
        </CardContent>
      </Card>
    </div>
  );
}

/* ---------- Main app ---------- */
function PaymentDatePlanner() {
  const [plans, setPlans] = useState(initialPlans);
  const [activeId, setActiveId] = useState(initialPlans[0].id);
  const [copied, setCopied] = useState(null);
  const [isAdmin, setIsAdmin] = useState(() => sessionStorage.getItem("ppl_admin") === "1");
  const [showLogin, setShowLogin] = useState(false);
  const [loadingRemote, setLoadingRemote] = useState(true);
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState("");
  const [dirty, setDirty] = useState(false);

  useEffect(() => {
    (async () => {
      const remote = await loadFromJsonBin();
      if (remote && remote.length) {
        setPlans(remote);
        setActiveId(remote[0].id);
      }
      setLoadingRemote(false);
    })();
  }, []);

  const activePlan = plans.find((p) => p.id === activeId) ?? plans[0];
  const activeSchedule = useMemo(() => (activePlan ? getSchedule(activePlan) : []), [activePlan]);

  const dashboard = useMemo(() => {
    const totalPrincipal = plans.reduce((s, p) => s + Number(p.principal || 0), 0);
    const totalRevenue = plans.reduce((s, p) => s + Number(p.total || 0), 0);
    const totalInterest = totalRevenue - totalPrincipal;
    const today = new Date();
    const collected = plans.reduce((sum, plan) => {
      const sched = getSchedule(plan);
      const paid = sched.filter((d) => d <= today).length;
      return sum + Math.min(paid * Number(plan.installment || 0), Number(plan.total || 0));
    }, 0);
    return { totalPrincipal, totalRevenue, totalInterest, collected, remainingMoney: Math.max(totalRevenue - collected, 0) };
  }, [plans]);

  const markDirty = () => { setDirty(true); setSaveMsg(""); };

  const updatePlan = (id, patch) => {
    if (!isAdmin) return;
    setPlans((prev) => prev.map((p) => (p.id === id ? { ...p, ...patch } : p)));
    markDirty();
  };

  const resetAll = () => {
    if (!isAdmin) return;
    setPlans(initialPlans);
    setActiveId(initialPlans[0].id);
    markDirty();
  };

  const addPlan = () => {
    if (!isAdmin) return;
    const nextId = (plans.length ? Math.max(...plans.map((p) => p.id)) : 0) + 1;
    const today = new Date();
    const newPlan = {
      id: nextId, title: `New plan ${nextId}`, principal: 0, total: 0, cadence: "monthly",
      startDate: toDateInputValue(today), endDate: toDateInputValue(addMonths(today, 2)),
      installment: 0, note: "",
    };
    setPlans((prev) => [newPlan, ...prev]);
    setActiveId(nextId);
    markDirty();
  };

  const deletePlan = (id) => {
    if (!isAdmin) return;
    setPlans((prev) => prev.filter((p) => p.id !== id));
    if (activeId === id) {
      const remaining = plans.filter((p) => p.id !== id);
      setActiveId(remaining[0]?.id ?? 0);
    }
    markDirty();
  };

  const copySchedule = async (plan) => {
    const sched = getSchedule(plan)
      .map((d, i) => `${i + 1}. ${formatDate(d.toISOString().slice(0, 10))}`)
      .join("\n");
    try {
      await navigator.clipboard.writeText(`${plan.title}\n${sched}`);
      setCopied(plan.id);
      setTimeout(() => setCopied(null), 1500);
    } catch { setCopied(null); }
  };

  const saveAll = async () => {
    setSaving(true); setSaveMsg("");
    try {
      await saveToJsonBin(plans);
      setSaveMsg("✓ Saved to cloud");
      setDirty(false);
      setTimeout(() => setSaveMsg(""), 2500);
    } catch (e) {
      setSaveMsg("⚠ " + e.message);
    }
    setSaving(false);
  };

  const logout = () => {
    sessionStorage.removeItem("ppl_admin");
    setIsAdmin(false);
  };

  if (loadingRemote) {
    return (
      <div className="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100 text-slate-600">
        Loading plans…
      </div>
    );
  }

  if (!activePlan) {
    return (
      <div className="min-h-screen p-8">
        <p className="mb-4">No plans yet.</p>
        {isAdmin && <Button onClick={resetAll}>Restore defaults</Button>}
      </div>
    );
  }

  const readOnly = !isAdmin;

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 p-4 md:p-8 text-slate-900">
      {showLogin && <LoginModal onLogin={() => { setIsAdmin(true); setShowLogin(false); }} onCancel={() => setShowLogin(false)} />}

      <div className="mx-auto max-w-7xl space-y-6">
        <div className="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
          <div>
            <div className="flex items-center gap-2">
              <h1 className="text-3xl font-bold tracking-tight">Payment Date Planner</h1>
              {isAdmin ? (
                <Badge className="bg-emerald-600 text-white">Admin</Badge>
              ) : (
                <Badge variant="outline">View only</Badge>
              )}
            </div>
            <p className="mt-2 max-w-3xl text-sm text-slate-600">
              {isAdmin
                ? "You can edit, add, and delete plans. Save your changes to publish them."
                : "View payment plans and schedules. Login as admin to edit."}
            </p>
          </div>
          <div className="flex flex-wrap gap-2">
            {isAdmin ? (
              <>
                <Button onClick={addPlan} className="gap-2"><Plus className="h-4 w-4" /> Add plan</Button>
                <Button variant="outline" onClick={resetAll} className="gap-2"><RotateCcw className="h-4 w-4" /> Reset</Button>
                <Button onClick={saveAll} disabled={saving || !dirty} className="gap-2 bg-emerald-600 hover:bg-emerald-700">
                  <Save className="h-4 w-4" /> {saving ? "Saving…" : (dirty ? "Save changes" : "Saved")}
                </Button>
                <Button variant="outline" onClick={logout} className="gap-2"><LogOut className="h-4 w-4" /> Logout</Button>
              </>
            ) : (
              <Button onClick={() => setShowLogin(true)} className="gap-2"><Lock className="h-4 w-4" /> Admin login</Button>
            )}
          </div>
        </div>

        {saveMsg && (
          <div className={cx("rounded-xl px-4 py-2 text-sm",
            saveMsg.startsWith("✓") ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700")}>
            {saveMsg}
          </div>
        )}

        <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-5">
          <Card className="shadow-sm xl:col-span-1">
            <CardContent className="p-5">
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-sm text-slate-500">Total Principal</div>
                  <div className="mt-2 text-3xl font-bold">${dashboard.totalPrincipal.toLocaleString()}</div>
                </div>
                <div className="rounded-2xl bg-slate-100 p-3"><Wallet className="h-6 w-6 text-slate-700" /></div>
              </div>
            </CardContent>
          </Card>
          <Card className="shadow-sm xl:col-span-1">
            <CardContent className="p-5">
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-sm text-slate-500">Interest Profit</div>
                  <div className="mt-2 text-3xl font-bold">${dashboard.totalInterest.toLocaleString()}</div>
                </div>
                <div className="rounded-2xl bg-emerald-100 p-3"><DollarSign className="h-6 w-6 text-emerald-700" /></div>
              </div>
            </CardContent>
          </Card>
          <Card className="shadow-sm xl:col-span-1">
            <CardContent className="p-5">
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-sm text-slate-500">Revenue</div>
                  <div className="mt-2 text-3xl font-bold">${dashboard.totalRevenue.toLocaleString()}</div>
                </div>
                <div className="rounded-2xl bg-blue-100 p-3"><DollarSign className="h-6 w-6 text-blue-700" /></div>
              </div>
            </CardContent>
          </Card>
          <Card className="shadow-sm xl:col-span-1">
            <CardContent className="p-5">
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-sm text-slate-500">Collected</div>
                  <div className="mt-2 text-3xl font-bold">${dashboard.collected.toLocaleString()}</div>
                </div>
                <div className="rounded-2xl bg-violet-100 p-3"><Wallet className="h-6 w-6 text-violet-700" /></div>
              </div>
            </CardContent>
          </Card>
          <Card className="shadow-sm xl:col-span-1">
            <CardContent className="p-5">
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-sm text-slate-500">Remaining Money</div>
                  <div className="mt-2 text-3xl font-bold">${dashboard.remainingMoney.toLocaleString()}</div>
                </div>
                <div className="rounded-2xl bg-amber-100 p-3"><DollarSign className="h-6 w-6 text-amber-700" /></div>
              </div>
            </CardContent>
          </Card>
        </div>

        <div className="grid gap-6 lg:grid-cols-[380px_1fr]">
          <Card className="shadow-sm">
            <CardHeader>
              <CardTitle className="flex items-center gap-2 text-lg">
                <CalendarDays className="h-5 w-5" /> Plans
              </CardTitle>
            </CardHeader>
            <CardContent className="space-y-3">
              {plans.map((plan) => {
                const sched = getSchedule(plan);
                const isActive = activeId === plan.id;
                return (
                  <button key={plan.id} onClick={() => setActiveId(plan.id)}
                    className={cx("w-full rounded-2xl border p-4 text-left transition hover:shadow-sm",
                      isActive ? "border-slate-900 bg-slate-900 text-white" : "border-slate-200 bg-white")}>
                    <div className="flex items-start justify-between gap-3">
                      <div>
                        <div className="font-semibold">{plan.title}</div>
                        <div className={cx("mt-1 text-sm", isActive ? "text-slate-200" : "text-slate-500")}>
                          {formatDate(plan.startDate)} → {plan.endDate ? formatDate(plan.endDate) : "Open-ended"}
                        </div>
                      </div>
                      <Badge variant={isActive ? "secondary" : "outline"}>{sched.length} dates</Badge>
                    </div>
                    <div className={cx("mt-3 text-sm", isActive ? "text-slate-200" : "text-slate-600")}>
                      Installment: ${plan.installment}
                    </div>
                  </button>
                );
              })}
            </CardContent>
          </Card>

          <Card className="shadow-sm">
            <CardHeader>
              <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                <div>
                  <CardTitle className="text-xl">{activePlan.title}</CardTitle>
                  <p className="mt-1 text-sm text-slate-500">{activePlan.note}</p>
                </div>
                <div className="flex gap-2">
                  <Button variant="outline" size="sm" className="gap-2" onClick={() => copySchedule(activePlan)}>
                    <Copy className="h-4 w-4" /> {copied === activePlan.id ? "Copied" : "Copy schedule"}
                  </Button>
                  {isAdmin && (
                    <Button variant="destructive" size="sm" className="gap-2" onClick={() => deletePlan(activePlan.id)}>
                      <Trash2 className="h-4 w-4" /> Delete
                    </Button>
                  )}
                </div>
              </div>
            </CardHeader>
            <CardContent>
              <Tabs defaultValue={isAdmin ? "edit" : "preview"} className="w-full">
                <TabsList className="grid w-full grid-cols-2">
                  <TabsTrigger value="edit">{isAdmin ? "Edit" : "Details"}</TabsTrigger>
                  <TabsTrigger value="preview">Preview</TabsTrigger>
                </TabsList>

                <TabsContent value="edit" className="mt-6">
                  <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                    <div className="space-y-2">
                      <Label>Title</Label>
                      <Input disabled={readOnly} value={activePlan.title}
                        onChange={(e) => updatePlan(activePlan.id, { title: e.target.value })} />
                    </div>
                    <div className="space-y-2">
                      <Label>Principal</Label>
                      <Input disabled={readOnly} type="number" value={activePlan.principal}
                        onChange={(e) => updatePlan(activePlan.id, { principal: Number(e.target.value) })} />
                    </div>
                    <div className="space-y-2">
                      <Label>Total</Label>
                      <Input disabled={readOnly} type="number" value={activePlan.total}
                        onChange={(e) => updatePlan(activePlan.id, { total: Number(e.target.value) })} />
                    </div>
                    <div className="space-y-2">
                      <Label>Installment</Label>
                      <Input disabled={readOnly} type="number" value={activePlan.installment}
                        onChange={(e) => updatePlan(activePlan.id, { installment: Number(e.target.value) })} />
                    </div>
                    <div className="space-y-2">
                      <Label>Cadence</Label>
                      <select disabled={readOnly}
                        className="h-10 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm disabled:bg-slate-50 disabled:text-slate-500"
                        value={activePlan.cadence}
                        onChange={(e) => updatePlan(activePlan.id, { cadence: e.target.value })}>
                        <option value="monthly">Monthly</option>
                        <option value="daily">Daily</option>
                        <option value="tenDays">Every 10 days</option>
                        <option value="custom">Custom dates</option>
                      </select>
                    </div>
                    <div className="space-y-2">
                      <Label>Start date</Label>
                      <Input disabled={readOnly} type="date" value={activePlan.startDate}
                        onChange={(e) => updatePlan(activePlan.id, { startDate: e.target.value })} />
                    </div>
                    <div className="space-y-2">
                      <Label>End date</Label>
                      <Input disabled={readOnly} type="date" value={activePlan.endDate}
                        onChange={(e) => updatePlan(activePlan.id, { endDate: e.target.value })} />
                    </div>
                    <div className="space-y-2 md:col-span-2 xl:col-span-3">
                      <Label>Note</Label>
                      <Textarea disabled={readOnly} value={activePlan.note} rows={4}
                        onChange={(e) => updatePlan(activePlan.id, { note: e.target.value })} />
                    </div>
                  </div>
                </TabsContent>

                <TabsContent value="preview" className="mt-6">
                  <div className="grid gap-4 xl:grid-cols-[1fr_300px]">
                    <div className="rounded-2xl border bg-white p-4">
                      <div className="mb-3 flex items-center justify-between">
                        <h3 className="font-semibold">Generated schedule</h3>
                        <Badge variant="outline">{activeSchedule.length} payment dates</Badge>
                      </div>
                      <div className="space-y-2">
                        {activeSchedule.map((date, idx) => (
                          <div key={idx} className="flex items-center justify-between rounded-xl border px-4 py-3">
                            <div className="font-medium">Payment {idx + 1}</div>
                            <div className="text-sm text-slate-600">{formatDate(date.toISOString().slice(0, 10))}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="space-y-4">
                      <div className="rounded-2xl border bg-slate-50 p-4">
                        <div className="text-sm text-slate-500">Summary</div>
                        <div className="mt-2 space-y-2 text-sm">
                          <div className="flex justify-between gap-4"><span>Principal</span><span className="font-medium">${activePlan.principal}</span></div>
                          <div className="flex justify-between gap-4"><span>Total</span><span className="font-medium">${activePlan.total}</span></div>
                          <div className="flex justify-between gap-4"><span>Installment</span><span className="font-medium">${activePlan.installment}</span></div>
                          <div className="flex justify-between gap-4"><span>Start</span><span className="font-medium">{formatDate(activePlan.startDate)}</span></div>
                          <div className="flex justify-between gap-4"><span>End</span><span className="font-medium">{activePlan.endDate ? formatDate(activePlan.endDate) : "—"}</span></div>
                        </div>
                      </div>

                      <div className="rounded-2xl border bg-white p-4 text-sm text-slate-600">
                        {isAdmin
                          ? "Tip: change the start date or cadence and the preview updates instantly. Click 'Save changes' to publish."
                          : "View-only mode. Login as admin to make changes."}
                      </div>
                    </div>
                  </div>
                </TabsContent>
              </Tabs>
            </CardContent>
          </Card>
        </div>

        <div className="rounded-2xl border bg-white p-4 text-sm text-slate-500">
          Built for quick editing of your payment plans and dates.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PaymentDatePlanner />);
</script>
</body>
</html>
